<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auth Server{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        h1 { margin: 0 0 8px 0; color: #1a1a2e; font-size: 28px; }
        .subtitle { color: #6b7280; margin: 0 0 28px 0; font-size: 14px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #374151;
            font-size: 14px;
            font-weight: 500;
        }
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        button {
            width: 100%;
            padding: 12px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.15s;
        }
        button:hover { box-shadow: 0 6px 18px rgba(102,126,234,0.35); }
        button:active { transform: translateY(1px); }
        button.secondary {
            background: #f3f4f6;
            color: #374151;
        }
        button.secondary:hover { box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .info {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: #047857;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .footer-link {
            text-align: center;
            margin-top: 18px;
            color: #6b7280;
            font-size: 14px;
        }
        .footer-link a { color: #667eea; text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
        .otp-input {
            text-align: center;
            font-size: 24px !important;
            letter-spacing: 8px;
            font-weight: 600;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row form { flex: 1; margin: 0; }
    </style>
</head>
<body>
    <div class="card">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
