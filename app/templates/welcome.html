{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block content %}
    <h1>🎉 Welcome!</h1>
    <p class="subtitle">You're signed in as <strong>{{ email }}</strong>.</p>

    <div style="background: #f9fafb; border-radius: 12px; padding: 20px; margin-bottom: 24px;">
        <p style="margin: 0; color: #4b5563; font-size: 15px; line-height: 1.6;">
            Your account is verified and ready to go. This is your protected
            welcome screen — only authenticated users can see it.
        </p>
    </div>

    <form action="/logout" method="post">
        <button type="submit">Log out</button>
    </form>
{% endblock %}
