services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_server
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_server"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://auth_user:auth_password@db:5432/auth_server
      SESSION_SECRET_KEY: change-me-to-a-long-random-string
      RESEND_API_KEY: ${RESEND_API_KEY:-re_your_api_key_here}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-10}
    ports:
      - "8000:8000"

volumes:
  postgres_data: